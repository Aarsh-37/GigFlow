version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: gigflow_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - gigflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow_backend
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    networks:
      - gigflow-net
    environment:
      NODE_ENV: development # Changed to development for dev server
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/gigflow
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key_here} # Use env var or fallback; ensure JWT_SECRET is set in .env
      FRONTEND_URL: http://frontend:5173 # Reference frontend service name
    volumes:
      - ./backend:/app # Mount backend code for development
      - /app/node_modules # Exclude node_modules from host mount

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigflow_frontend
    ports:
      - '5173:5173' # Vite default port
    depends_on:
      - backend
    networks:
      - gigflow-net
    environment:
      NODE_ENV: development # Changed to development for dev server
      VITE_API_URL: http://backend:5000/api # Point to backend service name
    volumes:
      - ./frontend:/app # Mount frontend code for development
      - /app/node_modules # Exclude node_modules from host mount

volumes:
  mongo_data:

networks:
  gigflow-net:
    driver: bridge
